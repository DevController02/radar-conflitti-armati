name: Radar Conflitti OSINT

# Attiva lo script ogni 15 minuti
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: # Permette di avviarlo anche manualmente

jobs:
  scansiona_notizie:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v3

    - name: Configura Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installa librerie
      run: |
        pip install gspread

    - name: Esegui il Motore di Analisi
      env:
        # Inietta la password segreta nel sistema
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      run: python motore_ai.py
