name: Radar Conflitti OSINT

# Attiva lo script ogni 15 minuti
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: # Permette di avviarlo anche manualmente

jobs:
  scansiona_notizie:
    runs-on: ubuntu-latest

        steps:
    - name: Controlla il codice del repository
      uses: actions/checkout@v3

    - name: Configura Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # --- QUESTO È IL BLOCCO MANCANTE DA AGGIUNGERE ---
    - name: Installa le librerie richieste
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # --- ORA IL MOTORE PUÒ PARTIRE SENZA ERRORI ---
    - name: Avvia il motore AI OSINT
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: python motore_ai.py
      
